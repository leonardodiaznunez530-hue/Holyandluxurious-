<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HolyAndLuxurious</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(black, #111);
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: black;
            border-bottom: 1px solid #222;
        }

        header h1 {
            font-size: 40px;
            letter-spacing: 3px;
        }

        nav {
            text-align: center;
            padding: 15px;
            background: #111;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: gold;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: #111;
            margin: 20px auto;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            border: 1px solid gold;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: black;
            border-top: 1px solid #222;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <h1>HOLY & LUXURIOUS</h1>
    <p>MODA • EXCLUSIVIDAD • ESTILO</p>
</header>

<nav>
    <a href="#">INICIO</a>
    <a href="#">MODELOS</a>
    <a href="#">CONTACTO</a>
</nav>

<div class="container">

    <div class="card">
        <h2>HELLSTAR</h2>
        <p>Streetwear exclusivo 🔥</p>
    </div>

    <div class="card">
        <h2>CAPS GFIVE</h2>
        <p>Dandy Hats / Barbas Hats 🧢</p>
    </div>

    <div class="card">
        <h2>BAPE</h2>
        <p>Moda premium 💎</p>
    </div>

</div>

<footer>
    <p>© 2026 HolyAndLuxurious</p>
</footer>

</body>
</html>
