<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLYANDLUXURIOUS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Playfair Display', serif;
    overflow-x: hidden;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 2s ease 2s forwards;
}

.intro h1 {
    font-size: 50px;
    letter-spacing: 8px;
    text-shadow: 0 0 20px white;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 40px white; }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* CONTENIDO */
.main {
    opacity: 0;
    animation: aparecer 2s ease 3s forwards;
}

@keyframes aparecer {
    to { opacity: 1; }
}

/* MURCIELAGO */
.bat {
    width: 120px;
    margin: 40px auto;
    display: block;
    filter: brightness(0) invert(1);
    animation: rotar 8s linear infinite;
}

@keyframes rotar {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

/* TITULO */
.titulo {
    text-align: center;
    font-size: 36px;
    letter-spacing: 6px;
    text-shadow: 0 0 15px white;
}

/* MARCAS */
.container {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-top: 120px;
}

.card {
    font-size: 30px;
    cursor: pointer;
    position: relative;
    transition: 0.4s;
}

/* LINEA ANIMADA */
.card::after {
    content: "";
    position: absolute;
    width: 0;
    height: 2px;
    background: white;
    bottom: -10px;
    left: 0;
    transition: 0.4s;
}

.card:hover::after {
    width: 100%;
}

.card:hover {
    transform: scale(1.1);
    text-shadow: 0 0 20px white;
}

/* PRODUCTOS */
.product-view {
    display: none;
    text-align: center;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

img {
    width: 260px;
    margin-top: 20px;
}

button {
    margin-top: 30px;
    padding: 10px 20px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: black;
    color: white;
    border: 1px solid white;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
    <h1>HOLYANDLUXURIOUS</h1>
</div>

<div class="main">

<img class="bat" src="https://cdn-icons-png.flaticon.com/512/616/616494.png">

<h1 class="titulo">HOLYANDLUXURIOUS</h1>

<!-- MARCAS -->
<div id="shop" class="container">

<div class="card" onclick="verProducto('bape')">
    BAPE
</div>

<div class="card" onclick="verProducto('hellstar')">
    HELLSTAR
</div>

</div>

<!-- PRODUCTOS -->
<div id="bape" class="product-view">
    <h1>BAPE</h1>
    <img src="bape.jpg">
    <br>
    <button onclick="volver()">VOLVER</button>
</div>

<div id="hellstar" class="product-view">
    <h1>HELLSTAR</h1>
    <img src="hellstar.jpg">
    <br>
    <button onclick="volver()">VOLVER</button>
</div>

</div>

<script>
function verProducto(id) {
    document.getElementById("shop").style.display = "none";
    document.getElementById("bape").style.display = "none";
    document.getElementById("hellstar").style.display = "none";
    document.getElementById(id).style.display = "block";
}

function volver() {
    document.getElementById("shop").style.display = "flex";
    document.getElementById("bape").style.display = "none";
    document.getElementById("hellstar").style.display = "none";
}
</script>

</body>
</html>
