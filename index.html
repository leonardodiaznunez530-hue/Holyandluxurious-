<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLYANDLUXURIOUS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    text-transform: uppercase;
}

/* TITULO */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

.titulo {
    font-family: 'Playfair Display', serif;
    text-align: center;
    font-size: 40px;
    letter-spacing: 5px;
    color: white;
    text-shadow: 0 0 10px white, 0 0 30px white;
}

/* MURCIELAGO */
.bat {
    width: 120px;
    display: block;
    margin: 30px auto;
    filter: brightness(0) invert(1);
    animation: rotar 6s infinite linear;
}

@keyframes rotar {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

/* MARCAS */
.container {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 80px;
}

.card {
    font-size: 28px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
    text-shadow: 0 0 15px white;
}

/* PRODUCTOS */
.product-view {
    display: none;
    text-align: center;
}

button {
    background: white;
    color: black;
    padding: 10px;
    border: none;
    margin-top: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<img class="bat" src="https://cdn-icons-png.flaticon.com/512/616/616494.png">

<h1 class="titulo">HOLYANDLUXURIOUS</h1>

<!-- SOLO MARCAS -->
<div id="shop" class="container">

<div class="card" onclick="verProducto('bape')">
    BAPE
</div>

<div class="card" onclick="verProducto('hellstar')">
    HELLSTAR
</div>

</div>

<!-- PRODUCTOS -->
<div id="bape" class="product-view">
    <h1>BAPE</h1>
    <img src="bape.jpg" width="250">
    <button onclick="volver()">VOLVER</button>
</div>

<div id="hellstar" class="product-view">
    <h1>HELLSTAR</h1>
    <img src="hellstar.jpg" width="250">
    <button onclick="volver()">VOLVER</button>
</div>

<script>
function verProducto(id) {
    document.getElementById("shop").style.display = "none";
    document.getElementById("bape").style.display = "none";
    document.getElementById("hellstar").style.display = "none";

    document.getElementById(id).style.display = "block";
}

function volver() {
    document.getElementById("shop").style.display = "flex";
    document.getElementById("bape").style.display = "none";
    document.getElementById("hellstar").style.display = "none";
}
</script>

</body>
</html>
