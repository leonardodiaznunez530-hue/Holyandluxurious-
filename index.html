<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLYANDLUXURIOUS</title>
<script src="https://js.stripe.com/v3/"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Playfair Display', serif;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 2s ease 2s forwards;
}

.intro h1 {
    font-size: 50px;
    letter-spacing: 8px;
    text-shadow: 0 0 20px white;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* CONTENIDO */
.main {
    opacity: 0;
    animation: aparecer 2s ease 3s forwards;
}

@keyframes aparecer {
    to { opacity: 1; }
}

/* MURCIELAGO */
.bat {
    width: 120px;
    margin: 40px auto;
    display: block;
    filter: brightness(0) invert(1);
    animation: rotar 8s linear infinite;
}

@keyframes rotar {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

/* TITULO */
.titulo {
    text-align: center;
    font-size: 36px;
    letter-spacing: 6px;
    text-shadow: 0 0 15px white;
}

/* MARCAS GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 40px;
    padding: 80px;
}

/* TARJETAS */
.card {
    text-align: center;
    font-size: 26px;
    padding: 40px;
    border: 1px solid #111;
    cursor: pointer;
    transition: 0.4s;
    position: relative;
    overflow: hidden;
}

/* EFECTO LUJO */
.card:hover {
    border: 1px solid white;
    box-shadow: 0 0 10px white, 0 0 20px white, 0 0 40px white;
    transform: scale(1.05);
    text-shadow: 0 0 10px white;
}

.card::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, white, transparent);
    top: -50%;
    left: -50%;
    opacity: 0;
}

.card:hover::before {
    opacity: 0.2;
    animation: brillo 1s linear;
}

@keyframes brillo {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* PROXIMAMENTE */
.proximo {
    display: block;
    font-size: 14px;
    margin-top: 10px;
    letter-spacing: 2px;
    opacity: 0.7;
}

/* PRODUCTO */
.product-view {
    display: none;
    text-align: center;
    animation: fadeIn 1s ease;
}

.product-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
}

.product {
    transition: 0.4s;
}

.product:hover {
    transform: translateY(-10px);
    text-shadow: 0 0 10px white;
}

.product img {
    width: 220px;
    display: block;
    margin: auto;
    transition: transform 0.3s;
}
.product img:hover { transform: scale(1.05); }

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    letter-spacing: 2px;
    font-weight: bold;
}

button:hover {
    background: black;
    color: white;
    border: 1px solid white;
    box-shadow: 0 0 10px white, 0 0 20px white;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 16px;
    margin-top: 50px;
}

/* CARRITO */
#carrito {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    width: 250px;
    display: none;
}
.carrito-item { display:flex; justify-content:space-between; }
.carrito-total { font-weight:bold; margin-top:10px; text-align:right; }

</style>
</head>

<body>

<div class="intro">
<h1>HOLYANDLUXURIOUS</h1>
</div>

<div class="main">

<img class="bat" src="https://cdn-icons-png.flaticon.com/512/616/616494.png">
<h1 class="titulo">HOLYANDLUXURIOUS</h1>

<!-- MARCAS -->
<div id="shop" class="container">
<div class="card" onclick="verProximamente()">BAPE<br><span class="proximo">PRÓXIMAMENTE</span></div>
<div class="card" onclick="verProducto('hellstar')">HELLSTAR</div>
<div class="card" onclick="verProximamente()">ESSENTIALS<br><span class="proximo">PRÓXIMAMENTE</span></div>
<div class="card" onclick="verProximamente()">ALO<br><span class="proximo">PRÓXIMAMENTE</span></div>
<div class="card" onclick="verProximamente()">SP5DER<br><span class="proximo">PRÓXIMAMENTE</span></div>
</div>

<!-- CARRITO -->
<div id="carrito">
<h3>Carrito</h3>
<div id="itemsCarrito"></div>
<div class="carrito-total" id="totalCarrito">Total: $0</div>
<button onclick="pagar()">Pagar</button>
</div>

<!-- HELLSTAR -->
<div id="hellstar" class="product-view">
<h1>HELLSTAR</h1>
<div class="product-container">

<div class="product">
<img src="hell1.jpg">
<p>Playera Flames</p>
<select id="talla-hell1">
<option>S</option><option>M</option><option>L</option>
</select>
<br>
<button onclick="agregarCarrito('HELLSTAR Playera Flames', 90, document.getElementById('talla-hell1').value)">Agregar</button>
</div>

<div class="product">
<img src="hell2.jpg">
<p>Hoodie Black</p>
<select id="talla-hell2">
<option>M</option><option>L</option><option>XL</option>
</select>
<br>
<button onclick="agregarCarrito('HELLSTAR Hoodie Black', 180, document.getElementById('talla-hell2').value)">Agregar</button>
</div>

</div>
<button onclick="volver()">VOLVER</button>
</div>

<div id="footer" class="footer" style="display:none;">© 2026 HOLYANDLUXURIOUS</div>

</div>

<script>
let carrito = [];

function verProducto(id){
document.getElementById("shop").style.display="none";
document.querySelectorAll(".product-view").forEach(el=>el.style.display="none");
document.getElementById(id).style.display="block";
document.querySelector(".titulo").style.display="none";
document.getElementById("footer").style.display="block";
}

function volver(){
document.getElementById("shop").style.display="grid";
document.querySelectorAll(".product-view").forEach(el=>el.style.display="none");
document.querySelector(".titulo").style.display="block";
document.getElementById("footer").style.display="none";
}

function verProximamente(){
alert("PRÓXIMAMENTE 🔥");
}

function agregarCarrito(nombre, precio, talla){
carrito.push({nombre, precio, talla});
actualizarCarrito();
}

function actualizarCarrito(){
document.getElementById("carrito").style.display="block";
let items = document.getElementById("itemsCarrito");
items.innerHTML="";
let total=0;

carrito.forEach(p=>{
total+=p.precio;
items.innerHTML+=`<div class="carrito-item">${p.nombre} (${p.talla}) <span>$${p.precio}</span></div>`;
});

document.getElementById("totalCarrito").innerText="Total: $"+total;
}

async function pagar(){
alert("Falta conectar Stripe 🔥");
}
</script>

</body>
</html>
