<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLY & LUXURIOUS</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-transform: uppercase;
}

/* TEXTO BRILLANTE */
h1, h2, p, a {
    text-shadow: 0 0 5px white, 0 0 10px white, 0 0 20px #aaa;
}

/* LOGO MURCIELAGO */
.logo3d {
    width: 120px;
    display: block;
    margin: 20px auto;
    animation: rotar 6s infinite linear;
}

@keyframes rotar {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

/* CONTENEDOR */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

/* TARJETAS */
.card {
    background: #111;
    padding: 20px;
    width: 220px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid #222;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    border: 1px solid white;
}

/* BOTONES */
button {
    background: white;
    color: black;
    border: none;
    padding: 10px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: gray;
}

/* CARRITO */
#cart {
    position: fixed;
    right: 0;
    top: 0;
    background: black;
    width: 260px;
    height: 100%;
    padding: 10px;
    border-left: 2px solid white;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

.whatsapp img {
    width: 60px;
}
</style>

</head>

<body>

<!-- LOGO -->
<img class="logo3d" src="https://cdn-icons-png.flaticon.com/512/616/616494.png">

<h1 style="text-align:center;">HOLY & LUXURIOUS</h1>

<div class="container">

<div class="card">
    <h2>HELLSTAR</h2>
    <p>$500</p>
    <button onclick="addToCart('HELLSTAR',500)">AGREGAR</button>
</div>

<div class="card">
    <h2>BAPE</h2>
    <p>$800</p>
    <button onclick="addToCart('BAPE',800)">AGREGAR</button>
</div>

</div>

<!-- CARRITO -->
<div id="cart">
    <h3>CARRITO 🛒</h3>
    <ul id="cart-items"></ul>
    <p>TOTAL: $<span id="total">0</span></p>

    <button onclick="pagar()">PAGAR 💳</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/521XXXXXXXXXX" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>
let total = 0;

function addToCart(nombre, precio) {
    let lista = document.getElementById("cart-items");
    let item = document.createElement("li");
    item.textContent = nombre + " - $" + precio;
    lista.appendChild(item);

    total += precio;
    document.getElementById("total").textContent = total;
}

function pagar() {
    alert("PAGO SIMULADO 💳 (SIGUIENTE PASO: INTEGRAR PAYPAL O STRIPE)");
}
</script>

</body>
</html>
