<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLY & LUXURIOUS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    text-transform: uppercase;
}

h1, h2, p {
    text-shadow: 0 0 5px white, 0 0 10px white;
}

/* LOGO */
.logo3d {
    width: 120px;
    display: block;
    margin: 20px auto;
    animation: rotar 6s infinite linear;
}

@keyframes rotar {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

/* PRODUCTOS */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #111;
    padding: 20px;
    width: 220px;
    text-align: center;
    border-radius: 10px;
    border: 1px solid #222;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    border: 1px solid white;
}

img {
    width: 200px;
}

/* BOTON */
button {
    background: white;
    color: black;
    padding: 10px;
    border: none;
}

/* CARRITO */
#cart {
    position: fixed;
    right: 0;
    top: 0;
    width: 250px;
    height: 100%;
    background: black;
    border-left: 2px solid white;
    padding: 10px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    left: 20px;
}
.whatsapp img {
    width: 60px;
}
</style>
</head>

<body>

<img class="logo3d" src="https://cdn-icons-png.flaticon.com/512/616/616494.png">

<h1 style="text-align:center;">HOLY & LUXURIOUS</h1>

<div class="container">

<a href="bape.html" style="text-decoration:none; color:white;">
<div class="card">
    <img src="bape.jpg">
    <h2>BAPE</h2>
    <p>$800</p>
    <button onclick="event.preventDefault(); addToCart('BAPE',800)">AGREGAR</button>
</div>
</a>

<a href="hellstar.html" style="text-decoration:none; color:white;">
<div class="card">
    <img src="hellstar.jpg">
    <h2>HELLSTAR</h2>
    <p>$500</p>
    <button onclick="event.preventDefault(); addToCart('HELLSTAR',500)">AGREGAR</button>
</div>
</a>

</div>

<div id="cart">
<h3>CARRITO</h3>
<ul id="cart-items"></ul>
<p>TOTAL: $<span id="total">0</span></p>
<button onclick="pagar()">PAGAR</button>
</div>

<a class="whatsapp" href="https://wa.me/521XXXXXXXXXX" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>
let total = 0;

function addToCart(nombre, precio) {
    let lista = document.getElementById("cart-items");
    let item = document.createElement("li");
    item.textContent = nombre + " - $" + precio;
    lista.appendChild(item);

    total += precio;
    document.getElementById("total").textContent = total;
}

function pagar() {
    alert("PAGO SIMULADO 💳");
}
</script>

</body>
</html>
