<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLYANDLUXURIOUS</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
}

/* GRID MARCAS */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 40px;
    padding: 60px;
}

.card {
    text-align: center;
    padding: 40px;
    border: 1px solid #222;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    border: 1px solid white;
    box-shadow: 0 0 20px white;
}

/* PRODUCTOS */
.products {
    display: none;
    padding: 40px;
}

.product {
    border: 1px solid #333;
    padding: 20px;
    margin: 20px;
    text-align: center;
}

.product img {
    width: 200px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- MARCAS -->
<div id="marcas" class="container">
    <div class="card" onclick="mostrar('bape')">BAPE</div>
    <div class="card" onclick="mostrar('hellstar')">HELLSTAR</div>
</div>

<!-- BAPE -->
<div id="bape" class="products">
    <h1>BAPE</h1>

    <div class="product">
        <img src="bape1.jpg">
        <h3>Camiseta BAPE Camo</h3>
        <p>Tallas: S, M, L, XL</p>
    </div>

    <div class="product">
        <img src="bape2.jpg">
        <h3>Sudadera BAPE Shark</h3>
        <p>Tallas: M, L, XL</p>
    </div>

    <button onclick="volver()">VOLVER</button>
</div>

<!-- HELLSTAR -->
<div id="hellstar" class="products">
    <h1>HELLSTAR</h1>

    <div class="product">
        <img src="hell1.jpg">
        <h3>Playera Hellstar Flames</h3>
        <p>Tallas: S, M, L</p>
    </div>

    <div class="product">
        <img src="hell2.jpg">
        <h3>Hoodie Hellstar Black</h3>
        <p>Tallas: M, L, XL</p>
    </div>

    <button onclick="volver()">VOLVER</button>
</div>

<script>
function mostrar(marca) {
    document.getElementById("marcas").style.display = "none";
    document.querySelectorAll(".products").forEach(el => el.style.display = "none");
    document.getElementById(marca).style.display = "block";
}

function volver() {
    document.getElementById("marcas").style.display = "grid";
    document.querySelectorAll(".products").forEach(el => el.style.display = "none");
}
</script>

</body>
</html>
